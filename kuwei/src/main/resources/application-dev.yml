server:
  port: 10921
  servlet:
    context-path: /api

spring:
  #datasource config
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/kuwei?characterEncoding=utf8&serverTimezone=GMT%2B8
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 10
      max-lifetime: 60000 # 连接的最大生命周期

# Redis config
#  data:
#    redis:
#      database: 0
#      port: 6379
#      host: localhost
#      password:

logging:
  level:
    root: debug
    org:
      springframework: info
    _org:
      springframework: info

# Diboot Configuration
diboot:
  init-sql: true #自动初始化SQL，开发环境下初次启动开启，初始化后可关闭
  i18n: false #启用国际化/
  file:
    # 文件存储路径（本地存储方式）
    storage-directory: //Users/xiwang/Desktop/charts/
  iam:
    # token-expires-minutes: 60
    # Shiro的匿名urls
    anon-urls:
      - /i18n-config/all
      - /swagger**/**
      - /webjars/**
      - /v3/**
      - /doc.html
      - /diboot-devtools/** # 允许devtools直接访问
    enable-permission-check: false
  #     - /auth/sso/** # 单点登录集成需打开该注释
  lcdp:
    devtools:
      codes-author: xiw
      codes-copyright: xiwwwwww
      codes-version: 1.0
      output-path: kuwei/src/main/java/com/xiw/kuwei/
      output-path-admin-ui: diboot-admin-ui/
      output-path-mobile-ui: diboot-mobile-ui/
      #output-path-sql: docs/update.sql # 数据结构变更SQL记录
      #upgrade: true # 开启版本升级
